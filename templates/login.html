<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNova Admin Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #111827, #1f2937);
    font-family: Arial, sans-serif;
}

.login-container {
    background: white;
    padding: 50px 40px;
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}

.brand {
    text-align: center;
    font-weight: bold;
    letter-spacing: 3px;
    font-size: 22px;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 35px;
}

label {
    font-size: 14px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #111827;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1f2937;
}

.back-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
}

.back-link a {
    color: #666;
    text-decoration: none;
}

.back-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-container">

    <div class="brand">SHOPNOVA</div>
    <div class="subtitle">Admin Dashboard Access</div>

    <form method="POST" action="/login">

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>

    </form>

    <div class="back-link">
        <a href="/">← Back to Shop</a>
    </div>

</div>

</body>
</html>
